    <script>
      (function () {
        const DATA_URL = "/static/members.json";

        function createMemberCell(item, isGraduate) {
          const td = document.createElement("td");
          td.setAttribute("width", "50%");
          td.setAttribute("align", "center");
          td.setAttribute("valign", "middle");
          const div = document.createElement("div");
          div.setAttribute("align", "justify");

          const p1 = document.createElement("p");
          const img = document.createElement("img");
          img.src = "/images/members/" + item.img;
          img.width = 96;
          img.height = 128;
          img.alt = "";
          img.loading = "lazy";
          img.className = "alignleft border";
          p1.appendChild(img);
          div.appendChild(p1);

          const p2 = document.createElement("p");
          const lines = [
            "姓名：" + item.name,
            "系所：" + item.dept,
            "修業期間：" + item.period,
          ];
          if (isGraduate && item.unit !== undefined) {
            lines.push("服務單位：" + item.unit);
          }
          lines.forEach(function (line, i) {
            p2.appendChild(document.createTextNode(line));
            if (i < lines.length - 1) {
              p2.appendChild(document.createElement("br"));
            }
          });
          div.appendChild(p2);
          td.appendChild(div);
          return td;
        }

        function populateTable(tableId, items, isGraduate) {
          const table = document.getElementById(tableId);
          table.setAttribute("width", "100%");
          table.setAttribute("cellpadding", "10");
          table.setAttribute("cellspacing", "0");
          for (let i = 0; i < items.length; i += 2) {
            const tr = document.createElement("tr");
            tr.appendChild(createMemberCell(items[i], isGraduate));
            if (i + 1 < items.length) {
              tr.appendChild(createMemberCell(items[i + 1], isGraduate));
            }
            table.appendChild(tr);
            if (i + 2 < items.length) {
              const spacer = document.createElement("tr");
              const spacerTd = document.createElement("td");
              spacerTd.setAttribute("colspan", "2");
              spacerTd.setAttribute("bgcolor", "#FFFFFF");
              spacerTd.innerHTML = "&nbsp;";
              spacer.appendChild(spacerTd);
              table.appendChild(spacer);
            }
          }
        }

        fetch(DATA_URL)
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            if (data.postgraduate) {
              populateTable("postgraduate-table", data.postgraduate, false);
            }
            if (data.graduate) {
              populateTable("graduate-table", data.graduate, true);
            }
          })
          .catch(function (error) {
            console.error("Error fetching members data:", error);
          });
      })();
    </script>
